{% extends 'dashboard.html' %} {% block addcss %}
<link
  rel="stylesheet"
  href="{{ url_for('static', filename='viewallnotes.css') }}"
/>
{% endblock %} {% block content %}

<div class="table-container">
  <div class="table-card">
    <h2>All Files</h2>

    <table>
      <thead>
        <tr>
          <th>File ID</th>
          <th>File Name</th>
          <th>Actions</th>
        </tr>
      </thead>

      <tbody>
        {% for i in allfilesdata %}

        <tr>
          <td>{{ i[0] }}</td>

          <td>{{ i[1] }}</td>

          <td class="action-buttons">
            <a href="{{ url_for('viewfile', fid=i[0]) }}" class="view-btn"
              >View</a>

            <a
              href="{{ url_for('downloadfile', fid=i[0]) }}"
              class="update-btn"
              >Download</a>

            <a
              href="{{ url_for('deletefile', fid=i[0]) }}"
              class="delete-btn"
              onclick="return confirm('Are you sure you want to delete this note?');
              "
            >
              Delete
            </a>
          </td>
        </tr>

        {% endfor %}
      </tbody>
    </table>
  </div>
</div>

{% endblock %}
